<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <title>{% block title %}Placement Portal{% endblock %}</title>
</head>

<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-lg">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">
            Placement Portal Cell
        </a>

        <div class="ms-auto">
            <a href="{{ url_for('login') }}" class="btn btn-outline-light me-2">
                Sign In
            </a>

            <a href="{{ url_for('logout') }}" class="btn btn-light text-success fw-semibold">
                Sign Out
            </a>
        </div>
    </div>
</nav>

<div class="container py-5">
    {% block content %}{% endblock %}
</div>

</body>
</html>
